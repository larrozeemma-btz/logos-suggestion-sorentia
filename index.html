<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sorentia — Exploration Logo</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Fraunces', serif;
  background: #FAF8F3;
  color: #1A1A1A;
  margin: 0;
}

.container {
  max-width: 1200px;
  margin: auto;
  padding: 40px;
}

h1 {
  font-size: 60px;
  font-weight: 300;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 40px;
  margin-top: 60px;
}

.card {
  transition: transform 0.3s;
}

.card:hover {
  transform: translateY(-5px);
}

.logo-frame {
  background: #F4EFE6;
  padding: 40px;
}

.logo-frame img {
  width: 100%;
}

.card-title {
  margin-top: 15px;
  font-size: 16px;
}

.card-desc {
  font-size: 12px;
  color: #6B6B6B;
}
</style>
</head>

<body>

<div class="container">

<h1>Sorentia — six directions</h1>

<div class="grid">

<div class="card">
<div class="logo-frame">
<img src="1.png">
</div>
<div class="card-title">Signe intégré</div>
<div class="card-desc">Typographie intégrée dans la forme</div>
</div>

<div class="card">
<div class="logo-frame">
<img src="2.png">
</div>
<div class="card-title">Aligné en haut</div>
<div class="card-desc">Moderne, startup</div>
</div>

<div class="card">
<div class="logo-frame">
<img src="3.png">
</div>
<div class="card-title">Point bas</div>
<div class="card-desc">Équilibré, intemporel</div>
</div>

<div class="card">
<div class="logo-frame">
<img src="4.png">
</div>
<div class="card-title">Point haut</div>
<div class="card-desc">Chaleureux, éditorial</div>
</div>

<div class="card">
<div class="logo-frame">
<img src="5.png">
</div>
<div class="card-title">Monogramme</div>
<div class="card-desc">Iconique</div>
</div>

<div class="card">
<div class="logo-frame" style="background:#1E7A7A;">
<img src="6.png">
</div>
<div class="card-title">Version lifestyle</div>
<div class="card-desc">Plus accessible</div>
</div>

</div>

</div>

</body>
</html>
